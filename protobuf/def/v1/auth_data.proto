syntax = 'proto3';

package muydelcampo;

option go_package = 'apigo/protobuf/gen/v1;';

option java_package = "com.muydelcampo.apigo";

import "auth_domain.proto";

message CodeReq {
  string phone = 1;
}

message CodeRes {
  string ref = 1;
}

message CodeDetailReq {
  string ref = 1;
}

message CodeDetailRes {
  Code result = 1;
}

message CodeVerifyReq {
  string ref = 1;
  string code = 2;
}

message CodeVerifyRes {
  string user_ref = 1;
  string access_token = 2;
}