syntax = 'proto3';

package muydelcampo;

option go_package = 'apigo/protobuf/gen/v1;';

option java_package = "com.muydelcampo.apigo";

import "authx.proto";

message CodeReq {
  string phone = 1;
}

message CodeRes {
  string ref = 1;
}

message CodeDetailReq {
  string ref = 1;
}

message CodeDetailRes {
  Code result = 1;
}

message VerifyCodeReq {
  string ref = 1;
  string code = 2;
}

message VerifyCodeRes {
  string uid = 1;
  string id_token = 2;
}