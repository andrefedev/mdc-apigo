syntax = 'proto3';

package muydelcampo;

option go_package = 'apigo/protobuf/gen/v1;';

import 'google/protobuf/timestamp.proto';

message User {
  string ref = 1;
  string name = 2;
  string phone = 3;
  bool is_staff = 4;
  bool is_super = 5;
  bool is_active = 6;
  optional google.protobuf.Timestamp last_login = 7;
  google.protobuf.Timestamp date_joined = 8;
}