syntax = "proto3";

package muydelcampo;

option go_package = "apigo/protobuf/gen/v1;";

import "data.proto";

service ApiService {

  // AUTH_SERVICE
  rpc Code(CodeReq) returns (CodeRes);
  rpc CodeDetail(CodeDetailReq) returns (CodeDetailRes);
  rpc CodeVerify(CodeVerifyReq) returns (CodeVerifyRes);

  // USER_SERVICE
  rpc Userme(UsermeReq) returns (UsermeRes);

  rpc UserDetail(UserDetailReq) returns (UserDetailRes);
  rpc UserCreate(UserCreateReq) returns (UserCreateRes);
  rpc UserUpdate(UserUpdateReq) returns (UserUpdateRes);
  rpc UserListAll(UserListAllReq) returns (UserListAllRes);

  // USER_ADDR__
  rpc UserAddrDetail(UserAddrDetailReq) returns (UserAddrDetailRes);
  // rpc UserAddrCreate(UserAddrCreateReq) returns (UserAddrCreateRes);
  // rpc UserAddrUpdate(UserAddrUpdateReq) returns (UserAddrUpdateRes);
  // rpc UserAddrDelete(UserAddrDeleteReq) returns (UserAddrDeleteRes);
  rpc UserAddrListAll(UserAddrListAllReq) returns (UserAddrListAllRes);

  // GOOGLE_MAPS__
  rpc PlaceDetail(PlaceDetailReq) returns (PlaceDetailRes);
  rpc ReverseGeocode(ReverseGeocodeReq) returns (ReverseGeocodeRes);
  rpc PlaceAutocomplete(PlaceAutocompleteReq) returns (PlaceAutocompleteRes);
}