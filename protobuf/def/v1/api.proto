syntax = 'proto3';

package muydelcampo;

option go_package = 'apigo/protobuf/gen/v1;';

import 'data.proto';

service Api {
  // Auth
  // Users
  rpc UserMe(UserMeReq) returns (UserMeRes);
  rpc UserDetail(UserDetailReq) returns (UserDetailRes);
  rpc UserCreate(UserCreateReq) returns (UserCreateRes);
  rpc UserUpdate(UserUpdateReq) returns (UserUpdateRes);
  rpc UserListAll(UserListAllReq) returns (UserListAllRes);

  // USER_ADDR
  rpc UserAddrDetail(UserAddrDetailReq) returns (UserAddrDetailRes);
  rpc UserAddrCreate(UserAddrCreateReq) returns (UserAddrCreateRes);
  rpc UserAddrUpdate(UserAddrUpdateReq) returns (UserAddrUpdateRes);
  rpc UserAddrDelete(UserAddrDeleteReq) returns (UserAddrDeleteRes);
  rpc UserAddrListAll(UserAddrListAllReq) returns (UserAddrListAllRes);

  // GENRES
  rpc GenreDetail(GenreDetailReq) returns (GenreDetailRes);
  rpc GenreCreate(GenreCreateReq) returns (GenreCreateRes);
  rpc GenreUpdate(GenreUpdateReq) returns (GenreUpdateRes);
  rpc GenreDelete(GenreDeleteReq) returns (GenreDeleteRes);
  rpc GenreListAll(GenreListAllReq) returns (GenreListAllRes);
  rpc GenreReOrder(GenreReOrderReq) returns (GenreReOrderRes);

  // PRODUCTS
  rpc ProductCreate(ProductCreateReq) returns (ProductCreateRes);
  rpc ProductUpdate(ProductUpdateReq) returns (ProductUpdateRes);
  rpc ProductDelete(ProductDeleteReq) returns (ProductDeleteRes);
  rpc ProductDetail(ProductDetailReq) returns (ProductDetailRes);
  rpc ProductListAll(ProductListAllReq) returns (ProductListAllRes);
  rpc ProductReOrder(ProductReOrderReq) returns (ProductReOrderRes);

  // ORDER
  rpc OrderCreate(OrderCreateReq) returns (OrderCreateRes);
  rpc OrderUpdate(OrderUpdateReq) returns (OrderUpdateRes);
  rpc OrderDelete(OrderDeleteReq) returns (OrderDeleteRes);
  rpc OrderDetail(OrderDetailReq) returns (OrderDetailRes);
  rpc OrderListAll(OrderListAllReq) returns (OrderListAllRes);
  rpc OrderChangeStatus(OrderChangeStatusReq) returns (OrderChangeStatusRes);

  // ORDER_LINE
  rpc OrderLineUpdate(OrderLineUpdateReq) returns (OrderLineUpdateRes);
  rpc OrderLineCreate(OrderLineCreateReq) returns (OrderLineCreateRes);
  rpc OrderLineDelete(OrderLineDeleteReq) returns (OrderLineDeleteRes);
  rpc OrderLineDetail(OrderLineDetailReq) returns (OrderLineDetailRes);
  rpc OrderLineListAll(OrderLineListAllReq) returns (OrderLineListAllRes);

  // ORDER_NOTE
  rpc OrderNoteCreate(OrderNoteCreateReq) returns (OrderNoteCreateRes);
  rpc OrderNoteUpdate(OrderNoteUpdateReq) returns (OrderNoteUpdateRes);
  rpc OrderNoteDelete(OrderNoteDeleteReq) returns (OrderNoteDeleteRes);
  rpc OrderNoteDetail(OrderNoteDetailReq) returns (OrderNoteDetailRes);
  rpc OrderNoteListAll(OrderNoteListAllReq) returns (OrderNoteListAllRes);

  // ORDER_DELIVERY
  rpc OrderDeliveryToday(OrderDeliveryTodayReq) returns  (OrderDeliveryTodayRes);

  // DELIVERY
  rpc DeliverySlotFilter(DeliverySlotFilterReq) returns (DeliverySlotFilterRes);

  // APP WRAPPER
  rpc ImageUpload(ImageUploadReq) returns (ImageUploadRes);

  // Google Maps
  rpc PlaceDetail(PlaceDetailReq) returns (PlaceDetailRes);
  rpc ReverseGeocode(ReverseGeocodeReq) returns (ReverseGeocodeRes);
  rpc PlaceAutocomplete(PlaceAutocompleteReq) returns (PlaceAutocompleteRes);
}
