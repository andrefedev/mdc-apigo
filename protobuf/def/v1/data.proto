syntax = 'proto3';

package muydelcampo;

option go_package = 'apigo/protobuf/gen/v1;';

option java_package = "com.muydelcampo.apigo";

import 'google/protobuf/field_mask.proto';

import "domain.proto";

// CODE


message CodeReq {
  string phone = 1;
}

message CodeRes {
  string ref = 1;
}

message CodeDetailReq {
  string ref = 1;
}

message CodeDetailRes {
  Code code = 1;
}

message CodeVerifyReq {
  string ref = 1;
  string code = 2;
}

message CodeVerifyRes {
  string user_ref = 1;
  string access_token = 2;
}

// USER

message UsermeReq {}

message UsermeRes {
  User user = 1;
}


message UserDetailReq {
  string ref = 1;
}

message UserDetailRes {
  User user = 1;
}

message UserCreateReq {
  Payload payload = 1;

  message Payload {
    string name = 1;
    string phone = 2;
    bool is_super = 3;
    bool is_staff = 4;
    bool isActive = 5;
  }
}

message UserCreateRes {
  User user = 1;
}

message UserUpdateReq {
  string ref = 1;
  Payload payload = 2;
  google.protobuf.FieldMask updateMask = 3;

  message Payload {
    string name = 1;
    string phone = 2;
    bool is_super = 3;
    bool is_staff = 4;
    bool is_active = 5;
  }
}

message UserUpdateRes {
  User user = 1;
}

message UserListAllReq {
  Filter filter = 1;
  Paging paging = 2;

  message Filter {
    optional bool is_super = 3;
    optional bool is_staff = 4;
    optional bool is_active = 5;
    optional string flat_query = 6;
  }

  message Paging {
    int32 limit = 1;
    int32 offset = 2;
  }
}

message UserListAllRes{
  repeated User users = 1;
}