syntax = 'proto3';

package muydelcampo;

option go_package = 'apigo/protobuf/gen/v1;';

option java_package = "com.muydelcampo.apigo";

import 'domain.proto';
// import 'google/protobuf/timestamp.proto';
import 'google/protobuf/field_mask.proto';

// # USER # //

message UserMeReq {}

message UserMeRes {
  User user = 1;
}

message UserCreateReq {
  Payload payload = 1;

  message Payload {
    string name = 1;
    string phone = 2;
    bool is_super = 3;
    bool is_staff = 4;
    bool isActive = 5;
  }
}

message UserCreateRes {
  User user = 1;
}

message UserUpdateReq {
  string ref = 1;
  Payload payload = 2;
  google.protobuf.FieldMask updateMask = 3;

  message Payload {
    string name = 1;
    string phone = 2;
    bool is_super = 3;
    bool is_staff = 4;
    bool is_active = 5;
  }
}

message UserUpdateRes {
  User user = 1;
}

message UserDetailReq {
  string ref = 1;
}

message UserDetailRes {
  User user = 1;
}

message UserListAllReq {
  Filter filter = 1;
  Paging paging = 2;

  message Filter {
    optional bool is_super = 3;
    optional bool is_staff = 4;
    optional bool is_active = 5;
    optional string flat_query = 6;
  }

  message Paging {
    int32 limit = 1;
    int32 offset = 2;
  }
}

message UserListAllRes{
  repeated User users = 1;
}

message UserAddrCreateReq {
  string uid = 1;
  Payload payload = 2;

  message Payload {
    string pid = 1; // place ref
    double lat = 2;
    double lng = 3;
    string name = 4;
    string cmna = 5;
    string route = 6;
    string street = 7;
    string neighb = 8;
    string locality = 9;
    string sublocal = 10;
    string address1 = 11; // casa / apto complemento
    string address2 = 12; // instrucciones de entrega
  }
}

message UserAddrCreateRes {
  UserAddr result = 1;
}

message UserAddrUpdateReq {
  string ref = 1;
  Payload payload = 2;
  google.protobuf.FieldMask updateMask = 3;

  message Payload {
    double lat = 1;
    double lng = 2;
    string address1 = 3; // casa / apto complemento
    string address2 = 4; // instrucciones de entrega
  }
}

message UserAddrUpdateRes {
  UserAddr result = 1;
}

message UserAddrDeleteReq {
  string ref = 1;
}

message UserAddrDeleteRes {
  UserAddr result = 1;
}

message UserAddrDetailReq {
  string ref = 1;
}

message UserAddrDetailRes {
  UserAddr result = 1;
}

message UserAddrListAllReq {
  string uid = 1;
}

message UserAddrListAllRes{
  repeated UserAddr results = 1;
}

