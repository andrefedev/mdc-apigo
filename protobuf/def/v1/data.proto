syntax = 'proto3';

package muydelcampo;

option go_package = 'apigo/protobuf/gen/v1;';

option java_package = "com.muydelcampo.apigo";

import 'google/protobuf/field_mask.proto';

import "domain.proto";

// CODE


message CodeReq {
  string phone = 1;
}

message CodeRes {
  string ref = 1;
}

message CodeDetailReq {
  string ref = 1;
}

message CodeDetailRes {
  Code code = 1;
}

message CodeVerifyReq {
  string ref = 1;
  string code = 2;
}

message CodeVerifyRes {
  string user_ref = 1;
  string access_token = 2;
}

// USER

message UsermeReq {}

message UsermeRes {
  User user = 1;
}


message UserDetailReq {
  string ref = 1;
}

message UserDetailRes {
  User user = 1;
}

message UserCreateReq {
  Payload payload = 1;

  message Payload {
    string name = 1;
    string phone = 2;
    bool is_super = 3;
    bool is_staff = 4;
    bool isActive = 5;
  }
}

message UserCreateRes {
  User user = 1;
}

message UserUpdateReq {
  string ref = 1;
  Payload payload = 2;
  google.protobuf.FieldMask updateMask = 3;

  message Payload {
    string name = 1;
    string phone = 2;
    bool is_super = 3;
    bool is_staff = 4;
    bool is_active = 5;
  }
}

message UserUpdateRes {
  User user = 1;
}

message UserListAllReq {
  Filter filter = 1;
  Paging paging = 2;

  message Filter {
    optional bool is_super = 3;
    optional bool is_staff = 4;
    optional bool is_active = 5;
    optional string flat_query = 6;
  }

  message Paging {
    int32 limit = 1;
    int32 offset = 2;
  }
}

message UserListAllRes{
  repeated User users = 1;
}

// USER_ADDR__

message UserAddrCreateReq {
  string uid = 1;
  Payload payload = 2;

  message Payload {
    string pid = 1; // place ref
    double lat = 2;
    double lng = 3;
    string name = 4;
    string cmna = 5;
    string route = 6;
    string street = 7;
    string neighb = 8;
    string locality = 9;
    string sublocal = 10;
    string address1 = 11; // casa / apto complemento
    string address2 = 12; // instrucciones de entrega
  }
}

message UserAddrCreateRes {
  UserAddr user_addr = 1;
}

message UserAddrUpdateReq {
  string ref = 1;
  Payload payload = 2;
  google.protobuf.FieldMask updateMask = 3;

  message Payload {
    double lat = 1;
    double lng = 2;
    string route = 3;
    string street = 4;
    string address1 = 5; // casa / apto complemento
    string address2 = 6; // instrucciones de entrega
  }
}

message UserAddrUpdateRes {
  UserAddr user_addr = 1;
}

message UserAddrDeleteReq {
  string ref = 1;
}

message UserAddrDeleteRes {
  UserAddr user_addr = 1;
}

message UserAddrDetailReq {
  string ref = 1;
}

message UserAddrDetailRes {
  UserAddr result = 1;
}

message UserAddrListAllReq {
  string uid = 1;
}

message UserAddrListAllRes{
  repeated UserAddr results = 1;
}

// CATLG__

message ProductDetailReq {
  string ref = 1;
}

message ProductDetailRes {
  Product product = 1;
}

message ProductCreateReq {
  Payload payload = 1;

  message Payload {
    string gid = 1;
    optional string upc = 2;
    string name = 3;
    optional string descr = 4;
    optional string imurl = 5;

    int32 weight = 6;
    string unitype = 7;
    int32 quantity = 8;

    bool is_active = 9;
    bool is_public = 10;
    int32 cost_price = 11;
    int32 base_price = 12;
    int32 num_in_stock = 14;
  }
}

message ProductCreateRes {
  Product product = 1;
}

message ProductUpdateReq {
  string ref = 1;
  Payload payload = 2;
  google.protobuf.FieldMask update_mask = 3;

  message Payload {
    string gid = 1;
    optional string upc = 2;
    string name = 3;
    optional string descr = 4;
    optional string imurl = 5;

    int32 weight = 6;
    string unitype = 7;
    int32 quantity = 8;

    bool is_active = 9;
    bool is_public = 10;
    int32 cost_price = 11;
    int32 base_price = 12;
    int32 num_in_stock = 14;
    int32 num_in_alloc = 15;
  }
}

message ProductUpdateRes {
  Product product = 1;
}

message ProductDeleteReq {
  string ref = 1;
}

message ProductDeleteRes {
  Product product = 1;
}

message ProductListAllReq {
  Filter filter = 1;

  message Filter {
    optional string query = 1;
    optional string genre = 2;
    optional bool is_active = 3;
    optional bool is_public = 4;
  }
}

message ProductListAllRes {
  repeated Product products = 1;
}

message ProductReOrderReq {
  repeated Payload updates = 1;

  message Payload {
    string ref = 1;
    int32 display = 2;
  }
}

message ProductReOrderRes {
  repeated Product results = 1;
}

// SALES__

message OrderCreateReq {
  Payload payload = 1;

  message Payload {
    string user = 1;
    string addr = 2;
    string slot = 3;
    string status = 4;
    string payment_status = 5;
    string payment_method = 6;
  }
}

message OrderCreateRes {
  Order result = 1;
}

message OrderUpdateReq {
  string ref = 1;
  Payload payload = 2;
  google.protobuf.FieldMask update_mask = 3;

  message Payload {
    string addr = 1;
    string slot = 2;
    string status = 3;
    string payment_status = 5;
    string payment_method = 6;
  }
}

message OrderUpdateRes {
  Order result = 1;
}

message OrderDeleteReq {
  string ref = 1;
}

message OrderDeleteRes {
  Order result = 1;
}

message OrderDetailReq {
  string ref = 1;
}

message OrderDetailRes {
  Order result = 1;
}

message OrderListAllReq {
  Filter filter = 1;
  Paging paging = 3;

  message Filter {
    optional string query = 1;
    optional string status = 2;
    optional string delivery = 4;
    optional string payment_status = 5;
  }

  message Paging {
    int32 limit = 1;
    int32 offset = 2;
  }
}

message OrderListAllRes {
  repeated Order results = 1;
}

message OrderChangeStatusReq {
  string ref = 1;
  string status = 2;
}

message OrderChangeStatusRes {
  Order result = 1;
}

// # ORDER_NOTE #

message OrderNoteCreateReq {
  string order = 1;
  Payload payload = 2;

  message Payload {
    string note = 1;
  }
}

message OrderNoteCreateRes {
  OrderNote result = 1;
}

message OrderNoteUpdateReq {
  string ref = 1;
  Payload payload = 2;
  google.protobuf.FieldMask updateMask = 3;

  message Payload {
    string note = 1;
  }
}

message OrderNoteUpdateRes {
  OrderNote result = 1;
}

message OrderNoteDeleteReq {
  string ref = 1;
}

message OrderNoteDeleteRes {
  OrderNote result = 1;
}

message OrderNoteDetailReq {
  string ref = 1;
}

message OrderNoteDetailRes {
  OrderNote result = 1;
}

message OrderNoteListAllReq {
  string order = 1;
}

message OrderNoteListAllRes {
  repeated OrderNote results = 1;
}

// # ORDER_LINE #

message OrderLineCreateReq {
  string order = 1;
  Payload payload = 2;

  message Payload {
    string pid = 1;
    string status = 2;
    int32 quantity = 3;
    int32 base_price = 4;
  }
}

message OrderLineCreateRes {
  OrderLine result = 1;
}

message OrderLineUpdateReq {
  string ref = 1;
  Payload payload = 2;
  google.protobuf.FieldMask updateMask = 3;

  message Payload {
    string status = 2;
    int32 quantity = 3;
    int32 base_price = 4;
  }
}

message OrderLineUpdateRes {
  OrderLine result = 1;
}

message OrderLineDeleteReq {
  string ref = 1;
}

message OrderLineDeleteRes {
  OrderLine result = 1;
}

message OrderLineDetailReq {
  string ref = 1;
}

message OrderLineDetailRes {
  OrderLine result = 1;
}

message OrderLineListAllReq {
  string order = 1;
}

message OrderLineListAllRes {
  repeated OrderLine results = 1;
}

// # ORDER_DELIVERY #

message OrderDeliveryTodayReq {}

message OrderDeliveryTodayRes {
  repeated Order results = 1;
}

// GOOGLE_MAPS__

message PlaceDetailReq {
  string ref = 1;
  string token = 2;
}

message PlaceDetailRes {
  Place place = 1;
}

message ReverseGeocodeReq {
  double lat = 1;
  double lng = 2;
}

message ReverseGeocodeRes {
  Place place = 1;
}

message PlaceAutocompleteReq {
  string query = 1;
  string token = 2;
}

message PlaceAutocompleteRes {
  string token = 1;
  repeated Prediction predictions = 2;
}